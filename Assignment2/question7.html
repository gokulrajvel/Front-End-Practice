<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question 7</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top, #fff1c7, #f6ead1 35%, #e0d5c1 100%);
            font-family: Arial, sans-serif;
        }

        .animated-button {
            position: relative;
            overflow: hidden;
            padding: 16px 34px;
            border: 2px solid #1f2937;
            border-radius: 999px;
            background: transparent;
            color: #1f2937;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: color 0.35s ease, transform 0.15s ease, box-shadow 0.35s ease;
            box-shadow: 0 10px 24px rgba(31, 41, 55, 0.16);
        }

        .animated-button::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, #f97316, #facc15);
            transform: translateX(-100%);
            transition: transform 0.35s ease;
            z-index: 0;
        }

        .animated-button span {
            position: relative;
            z-index: 1;
        }

        .animated-button:hover {
            color: #ffffff;
            box-shadow: 0 14px 30px rgba(249, 115, 22, 0.3);
        }

        .animated-button:hover::before {
            transform: translateX(0);
        }

        .animated-button:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body>
    <button class="animated-button">
        <span>Explore More</span>
    </button>
</body>
</html>
