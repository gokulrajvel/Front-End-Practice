<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question 5</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f4f7fb, #dbeafe);
            font-family: Arial, sans-serif;
        }

        .navbar {
            padding: 18px 28px;
            border-radius: 18px;
            background: #ffffff;
            box-shadow: 0 14px 30px rgba(15, 23, 42, 0.12);
        }

        .nav-list {
            margin: 0;
            padding: 0;
            list-style: none;
            display: flex;
            gap: 28px;
        }

        .nav-link {
            position: relative;
            display: inline-block;
            padding: 10px 4px;
            color: #1f2937;
            text-decoration: none;
            font-size: 18px;
            font-weight: 600;
        }

        .nav-link::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 3px;
            background: #2563eb;
            border-radius: 999px;
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
        }

        .nav-link:hover {
            color: #2563eb;
        }

        .nav-link:hover::after {
            transform: scaleX(1);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <ul class="nav-list">
            <li><a class="nav-link" href="#">Home</a></li>
            <li><a class="nav-link" href="#">About</a></li>
            <li><a class="nav-link" href="#">Services</a></li>
            <li><a class="nav-link" href="#">Contact</a></li>
        </ul>
    </nav>
</body>
</html>
