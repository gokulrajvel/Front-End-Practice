<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question 4</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #eef2f7;
            font-family: Arial, sans-serif;
        }

        .image-card {
            position: relative;
            width: 320px;
            height: 220px;
            overflow: hidden;
            border-radius: 16px;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.18);
            cursor: pointer;
        }

        .image-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }

        .overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.45);
            color: #ffffff;
            font-size: 24px;
            font-weight: 700;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .image-card:hover img {
            transform: scale(1.12);
        }

        .image-card:hover .overlay {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="image-card">
        <img src="wallpaperflare.com_wallpaper (2).jpg" alt="Mountain landscape">
        <div class="overlay">Beautiful View</div>
    </div>
</body>
</html>
