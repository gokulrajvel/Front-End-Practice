<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question 3</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f4f7fb;
            font-family: Arial, sans-serif;
        }

        .action-button {
            padding: 14px 28px;
            border: none;
            border-radius: 10px;
            background-color: #2563eb;
            color: #ffffff;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease, color 0.3s ease, transform 0.3s ease;
        }

        .action-button:hover {
            background-color: #f59e0b;
            color: #1f2937;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <button class="action-button">Hover Me</button>
</body>
</html>
